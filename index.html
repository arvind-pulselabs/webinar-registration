<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Webinar Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <header id="hero">
    <div class="container">
      <p id="brand-name" class="brand"></p>
      <h1 id="webinar-title"></h1>
      <p id="webinar-meta" class="meta"></p>
      <div id="seats-badge" class="badge"></div>
    </div>
  </header>


  <main class="container">


    <section id="topics-section">
      <h2>What you will learn</h2>
      <ul id="topics-list"></ul>
    </section>


    <section id="speaker-section">
      <h2>Your instructor</h2>
      <p><strong id="speaker-name"></strong></p>
      <p id="speaker-bio"></p>
    </section>


    <section id="register-section">
      <h2>Register now</h2>
      <div id="session-select-wrapper">
        <label>Select session</label>
        <select id="session-select"></select>
      </div>
      <div id="price-display"></div>


      <form id="reg-form" novalidate>
        <label>Full name *
          <input type="text" id="f-name" required placeholder="As it appears on certificate">
        </label>
        <label>Email address *
          <input type="email" id="f-email" required placeholder="you@example.com">
        </label>
        <label>WhatsApp number *
          <input type="tel" id="f-phone" required placeholder="+91 98765 43210">
        </label>
        <div id="form-error" class="error" style="display:none"></div>
        <button type="submit" id="submit-btn">
          Proceed to payment
        </button>
        <p class="fine-print">
          By registering you agree to our refund policy.
          Secure payment via PayU.
        </p>
      </form>
    </section>


    <section id="faq-section">
      <h2>Frequently asked questions</h2>
      <div id="faq-list"></div>
    </section>


  </main>


  <footer id="site-footer">
    <p id="footer-brand"></p>
    <p id="footer-contact"></p>
  </footer>


  <div id="overlay" style="display:none">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p>Saving your registration...</p>
      <p class="fine-print">Do not close this page.</p>
    </div>
  </div>


  <script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_uFZY4jfGdpnxfBdm5Sfy3py42EXWqup9OA2HGQUVVq9xBZtcbE8mw_B0ibu7TjFR/exec";

  async function init() {
    const cfg = await fetch("config.json").then(r => r.json());
    const brand = cfg.brand;
    const activeSessions = cfg.sessions.filter(s => s.active);


    // Apply brand colour
    document.documentElement.style.setProperty("--brand", brand.primaryColor);
    document.title = brand.name + " — Register";
    document.getElementById("page-title").textContent = brand.name + " — Register";
    document.getElementById("brand-name").textContent = brand.name;
    document.getElementById("footer-brand").textContent = brand.name;
    document.getElementById("footer-contact").innerHTML =
      "Support: <a href='mailto:" + brand.supportEmail + "'>" +
      brand.supportEmail + "</a>  |  " + brand.supportPhone;


    // Populate session select
    const sel = document.getElementById("session-select");
    activeSessions.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s.id;
      opt.textContent = s.title + " — " + s.date + " at " + s.time;
      sel.appendChild(opt);
    });


    function getSelected() {
      return activeSessions.find(s => s.id === sel.value);
    }


    function renderSession(s) {
      document.getElementById("webinar-title").textContent = s.title;
      document.getElementById("webinar-meta").textContent =
        s.date + "  •  " + s.time + "  •  " + s.duration;
      document.getElementById("seats-badge").textContent =
        s.seatsLeft + " seats remaining";
      document.getElementById("price-display").innerHTML =
        "<span class='price'>₹" + s.price.toLocaleString("en-IN") + "</span>  <span class='price-note'>inclusive of all taxes</span>";
      const ul = document.getElementById("topics-list");
      ul.innerHTML = "";
      s.topics.forEach(t => {
        const li = document.createElement("li");
        li.textContent = t; ul.appendChild(li);
      });
      document.getElementById("speaker-name").textContent = s.speaker;
      document.getElementById("speaker-bio").textContent = s.speakerBio;
    }


    sel.addEventListener("change", () => renderSession(getSelected()));
    if (activeSessions.length) renderSession(activeSessions[0]);


    // FAQs
    const faqDiv = document.getElementById("faq-list");
    cfg.faqs.forEach(f => {
      faqDiv.innerHTML += "<details><summary>" + f.q +
        "</summary><p>" + f.a + "</p></details>";
    });


    // Form submit
    document.getElementById("reg-form").addEventListener("submit", async e => {
      e.preventDefault();
      const name  = document.getElementById("f-name").value.trim();
      const email = document.getElementById("f-email").value.trim();
      const phone = document.getElementById("f-phone").value.trim();
      const errEl = document.getElementById("form-error");
      errEl.style.display = "none";


      if (!name || !email || !phone) {
        errEl.textContent = "Please fill in all required fields.";
        errEl.style.display = "block"; return;
      }
      if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        errEl.textContent = "Please enter a valid email address.";
        errEl.style.display = "block"; return;
      }


      const session = getSelected();
      document.getElementById("submit-btn").disabled = true;
      document.getElementById("overlay").style.display = "flex";


      try {
        // POST registration to Apps Script
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source: "landing_page",
            name, email, phone,
            session:     session.title,
            sessionDate: session.date,
            sessionTime: session.time,
            sessionId:   session.id,
            amount:      session.price
          })
        });
      } catch(err) {
        // no-cors means fetch always "succeeds" — Sheet write confirmed via PayU webhook
      }


      // Redirect to PayU regardless — payment confirmation is the source of truth
      window.location.href = session.payuLink;
    });
  }
  init();
  </script>

</body>
</html>
