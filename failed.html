<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Unsuccessful</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="hero" style="background:#A32D2D;">
    <div class="container">
      <h1>Payment unsuccessful</h1>
      <p class="meta">Do not worry — your spot is still available.</p>
    </div>
  </header>
  <main class="container" style="text-align:center; padding-top:48px;">
    <p style="font-size:1.1rem; margin-bottom:24px;">
      Your payment could not be processed.
      No amount has been deducted from your account.
    </p>
    <a href="index.html"
       style="display:inline-block; background:#4A3FB5; color:#fff;
              padding:12px 32px; border-radius:8px; text-decoration:none;
              font-weight:bold;">
      Try again
    </a>
    <p style="margin-top:32px; color:#888; font-size:13px;">
      Need help? WhatsApp us or email
      <a href="mailto:support@yourdomain.com">support@yourdomain.com</a>
    </p>
  </main>
</body>
</html>
